name: Deploy Portfolio to gh-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish static files
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p /tmp/portfolio-pages
          rsync -av \
            --delete \
            --exclude ".git" \
            --exclude ".github" \
            ./ /tmp/portfolio-pages/

          touch /tmp/portfolio-pages/.nojekyll

          git fetch origin gh-pages || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
          fi

          find . -mindepth 1 \
            ! -path "./.git" \
            ! -path "./.git/*" \
            -exec rm -rf {} +

          rsync -av /tmp/portfolio-pages/ ./
          git add .
          git commit -m "Deploy portfolio to GitHub Pages" || echo "No changes to deploy"
          git push origin gh-pages
